include-file = /home/adri/.config/polybar/colors.ini

[bar/bar1]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMonoNerdFontMono-Regular;2 
font-1 = Symbols Nerd Font Mono-Regular;3

modules-left = launcher xworkspaces xwindow
modules-center = 
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

include-file = /home/adri/.config/polybar/modules.ini

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
