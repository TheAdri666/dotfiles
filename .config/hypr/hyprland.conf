
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

$scriptsDir=~/.config/hypr/scripts

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-2, preferred, 0x0, 1
monitor=DP-1, 1920x1080@144, 1920x0, 1
#monitor=, prefered, auto, auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
# $fileManager = $scriptsDir/open-ranger.sh $terminal
$fileManager = thunar
$menu = $scriptsDir/launch-wofi.sh -Iia --show drun -W 35%
$browser = firefox
$music = env --chdir /tmp spotify
$messaging = telegram-desktop
$mail = thunderbird
$programming = code --enable-features=UseOzonePlatform --ozone-platform=wayland
$emoji = bemoji -n
$refreshBar = killall waybar;  waybar & disown
$audioControl = GDK_BACKEND=x11 pavucontrol -t 3
$takeScreenshot = grimblast --freeze copy area
$saveScreenshot = grimblast --freeze --notify save area ~/Pictures/Screenshots/Screenshot_$(date +'%d-%m-%y_%T.png')
$streaming = stremio
# $calling = discord
# $calling = vesktop --enable-features=UseOzonePlatform --ozone-platform=wayland
$calling = teamspeak --ozone-platform=x11 --ozone-platform-hint=x11
$passwordManager = keepassxc

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpaper &
exec-once = waybar &
exec-once = dunst &
exec-once = systemctl --user start plasma-polkit-agent &
exec-once = udiskie &
exec-once = /usr/local/bin/launch-minecraft-server.sh &
exec-once = sway-audio-idle-inhibit &
exec-once = $mail &
exec-once = hypridle &
# exec-once = $scriptsDir/lock-screen-daemon.sh &
exec-once = $scriptsDir/paula-telegram-bot.sh &
exec-once = $scriptsDir/connect-sinks.sh &

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,adri_cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,adri_cursors
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # drop_shadow = true
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
} 


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.4 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
# device {
# 	name = razer-razer-mamba-elite 
# 	accel_profile = flat
# 	sensitivity = -0.85
# }

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindd = $mainMod, RETURN, Open terminal., exec, $terminal
bindd = $mainMod, Q, Kill active window., killactive
bindd = ALT, F4, Kill active window., killactive
bindd = $mainMod SHIFT, ESCAPE, Exit hyprland., exit
bindd = $mainMod, ESCAPE, Refresh top bar.,  exec, $refreshBar
bindd = $mainMod, E, Open file manager., exec, $fileManager
bindd = $mainMod, T, Toggle floating state of active window., togglefloating
bindd = $mainMod, P, Toggle pseudotiling of active window., pseudo
bindd = $mainMod, W, Open browser, exec, $browser
bindd = $mainMod, F, Toggle fullscreen of active window., fullscreen
bindd = $mainMod, I, Toggle special workspace., togglespecialworkspace
bindd = $mainMod SHIFT, M, Toggle maximized state of active window., fullscreen, 1
bindd = $mainMod, R, Open Steam., exec, steam
bindd = $mainMod, U, Open music player., exec, $music
bindd = $mainMod, M, Open messaging app., exec, $messaging
bindd = $mainMod, V, Open code editor., exec, $programming
bindd = $mainMod, D, Open voice calling app., exec, $calling
bindd = $mainMod, S, Open torrent streaming app., exec, $streaming
bindd = $mainMod SHIFT, S, Take screenshot and copy to clipboard., exec, $takeScreenshot 
bindd = $mainMod CTRL SHIFT, S, Take screenshot and save., exec, $saveScreenshot 
bindd = $mainMod, PERIOD, Open emoji picker., exec, $emoji
bindd = $mainMod, C, Open color picker., exec, hyprpicker -a
bindd = $mainMod, A, Open audio control., exec, $audioControl
bindd = $mainMod, B, Open mail client., exec, $mail
bindd = $mainMod, F1, Focus monitor 1., exec, hyprctl dispatch focusmonitor DP-1
bindd = $mainMod, F2, Focus monitor 2., exec, hyprctl dispatch focusmonitor DP-2
bindd = $mainMod, L, Open logout menu., exec, wlogout -b 6
bindd = $mainMod SHIFT, F1, Move current workspace to monitor 1., exec, hyprctl dispatch movecurrentworkspacetomonitor DP-1
bindd = $mainMod SHIFT, F2, Move current workspace to monitor 2., exec, hyprctl dispatch movecurrentworkspacetomonitor DP-2
bindd = $mainMod SHIFT, J, Toggle split mode of active window., togglesplit
bindd = $mainMod, K, Open password manager., exec, $passwordManager
bindd = $mainMod SHIFT, W, Reconnect custom sinks., exec, $scriptsDir/connect-sinks.sh
bindd = $mainMod, G, Kill all ryujinx instances., exec, $scriptsDir/kill-ryujinx.sh
bindd = ALT, Tab, Cycle to next window in workspace., cyclenext
bindd = ALT, Tab, Bring active window to top of workspace., bringactivetotop
bindd = ALT SHIFT, Tab, Cycle to previous window in workspace., cyclenext, prev
bindd = ALT SHIFT, Tab, Bring active window to top of workspace., bringactivetotop
bindd = CTRL SHIFT, ESCAPE, Open task manager., exec, $scriptsDir/start-btop-fullscreen.sh 
binddr = $mainMod, SPACE, Open app menu., exec, $menu

# Move focus with mainMod + arrow keys
bindd = $mainMod SHIFT, H, Move focus to the left., movefocus, l
bindd = $mainMod SHIFT, L, Move focus to the right., movefocus, r
bindd = $mainMod SHIFT, K, Move focus upwards., movefocus, u
bindd = $mainMod SHIFT, J, Move focus downwards., movefocus, d

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1., workspace, 1
bindd = $mainMod, 2, Switch to workspace 2., workspace, 2
bindd = $mainMod, 3, Switch to workspace 3., workspace, 3
bindd = $mainMod, 4, Switch to workspace 4., workspace, 4
bindd = $mainMod, 5, Switch to workspace 5., workspace, 5
bindd = $mainMod, 6, Switch to workspace 6., workspace, 6
bindd = $mainMod, 7, Switch to workspace 7., workspace, 7
bindd = $mainMod, 8, Switch to workspace 8., workspace, 8
bindd = $mainMod, 9, Switch to workspace 9., workspace, 9
bindd = $mainMod, 0, Switch to workspace 10., workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move active window to workspace 1., movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move active window to workspace 2., movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move active window to workspace 3., movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move active window to workspace 4., movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move active window to workspace 5., movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move active window to workspace 6., movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move active window to workspace 7., movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move active window to workspace 8., movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move active window to workspace 9., movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move active window to workspace 10., movetoworkspace, 10
bindd = $mainMod SHIFT, I, Move active window to special workspace., movetoworkspace, special

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll.
bindd = $mainMod, mouse_down, Go to next workspace., workspace, e+1
bindd = $mainMod, mouse_up, Go to previous workspace., workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging.
binddm = $mainMod, mouse:272, Move window., movewindow
binddm = $mainMod, mouse:273, Resize window., resizewindow

# Audio control with multimedia keys.
binddl = , XF86AudioNext, Next track., exec, playerctl next
binddl = , XF86AudioPrev, Previous track., exec, playerctl previous
binddl = , XF86AudioPlay, Play/pause., exec, playerctl play-pause
binddl = , XF86AudioStop, Stop playback., exec, playerctl stop
binddl = CTRL SHIFT, 1, Switch audio sink to headphones and sunshine., exec, pactl set-default-sink sunshine-audio
binddl = CTRL SHIFT, 2, Switch audio sink to speakers., exec, pactl set-default-sink speakers-audio

# Multimedia keys for volume and LCD brightness.
binddel = , XF86AudioRaiseVolume, Raise volume., exec, $scriptsDir/volume-control.sh -i
binddel = , XF86AudioLowerVolume, Lower volume., exec, $scriptsDir/volume-control.sh -d
binddel = , XF86AudioMute, Toggle mute., exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binddel = , XF86AudioMicMute, Toggle mic mute., exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binddel = , XF86MonBrightnessUp, Increase brightness., exec, brightnessctl s 10%+
binddel = , XF86MonBrightnessDown, Decrease brightness., exec, brightnessctl s 10%-

# TeamSpeak passthrough
bind = , F9, pass, class:^(TeamSpeak)$
bind = , F10, pass, class:^(TeamSpeak)$
bind = , F11, pass, class:^(TeamSpeak)$
bind = , F12, pass, class:^(TeamSpeak)$
bind = , Pause, pass, class:^(TeamSpeak)$
bind = , Scroll_Lock, pass, class:^(TeamSpeak)$

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# To see the classes and titles for a window, run `hyprctl clients` with the window open.

# Web Browsers
windowrule = match:class ^(firefox)$, workspace 1
windowrule = match:class ^(google-chrome)$, workspace 1

# Code Editors
windowrule = match:class ^(code)$, workspace 2

# Media
windowrule = match:class ^(spotify)$, workspace 3
windowrule = match:class ^(com.stremio.stremio)$, workspace 3
windowrule = match:class ^(mpv)$, workspace 3
windowrule = match:class ^(com.obsproject.Studio)$, workspace 3
windowrule = match:class ^(mpv)$, workspace 3

# Games
windowrule = match:class ^(Minecraft.*)$, workspace 4
windowrule = match:class ^(steam_app.*)$, workspace 4
windowrule = match:class ^(Terraria.*)$, workspace 4
windowrule = match:class ^(dotnet)$, workspace 4
windowrule = match:class ^(parsecd)$, workspace 4
windowrule = match:class ^(shadps4)$, workspace 4
windowrule = match:class ^(com.moonlight_stream.Moonlight)$, workspace 4
windowrule = match:class ^(Ryujinx)$, workspace 4
windowrule = match:class ^(org.citron_emu.citron)$, workspace 4
windowrule = match:class ^(eden)$, workspace 4
windowrule = match:class ^(org.sudachi_emu.sudachi)$, workspace 4
windowrule = match:class ^(hollow_knight.x86_64)$, workspace 4
windowrule = match:class ^(forager.exe)$, workspace 4
windowrule = match:class ^(VampireSurvivors.exe)$, workspace 4

# Terminal Emulators
windowrule = match:class ^(kitty)$, workspace 5

# Game Launchers
windowrule = match:class ^(steam)$, workspace 6
windowrule = match:class ^(heroic)$, workspace 6
windowrule = match:class ^(Minecraft Launcher)$, workspace 6
windowrule = match:class ^(hydralauncher)$, workspace 6
windowrule = match:class ^(modrinth-app)$, workspace 6
windowrule = match:class ^(net.lutris.Lutris)$, workspace 6
windowrule = match:class ^(rpcs3)$, workspace 6
windowrule = match:class ^(CurseForge)$, workspace 6

# Chat
windowrule = match:class ^(slack)$, workspace 7
windowrule = match:class ^(org.telegram.desktop)$, workspace 7
windowrule = match:class ^(discord)$, workspace 7
windowrule = match:class ^(vesktop)$, workspace 7
windowrule = match:class ^(whatsapp.*)$, workspace 7
windowrule = match:class ^(walc)$, workspace 7
windowrule = match:class ^(Beeper)$, workspace 7
windowrule = match:class ^(Signal)$, workspace 7
windowrule = match:class ^(TeamSpeak)$, workspace 7

# Office
windowrule = match:class ^(gimp.*)$, workspace 8
windowrule = match:class ^(libreoffice-startcenter)$, workspace 8
windowrule = match:class ^(eog)$, workspace 8

# File Explorers
windowrule = match:class ^([tT]hunar)$, workspace 9

# Misc
windowrule = match:class ^(org.qbittorrent.qBittorrent)$, workspace 10
windowrule = match:class ^(btop)$, workspace 10
windowrule = match:class ^(blueman-manager)$, workspace 10
windowrule = match:class ^(nwg-look)$, workspace 10
windowrule = match:class ^(qt[56]ct)$, workspace 10
windowrule = match:class ^(sqlitebrowser)$, workspace 10
windowrule = match:class ^(qpwgraph)$, workspace 10
windowrule = match:class ^(droidcam)$, workspace 10
windowrule = match:class ^(rquickshare)$, workspace 10
windowrule = match:class ^(scrcpy)$, workspace 10
windowrule = match:class ^(deadlock-mod-manager)$, workspace 10
windowrule = match:class ^(deadlock-modmanager-bin)$, workspace 10

# Always Open In Background
windowrule = match:class ^(org.mozilla.Thunderbird)$, workspace special
windowrule = match:class ^(eu.betterbird.Betterbird)$, workspace special
windowrule = match:class ^(org.keepassxc.KeePassXC)$, workspace special
                                
# Behaviour Window Rules
windowrule = match:class .*, suppress_event maximize

windowrule {
  name = Xwayland Video Bridge Settings
  match:class = ^(xwaylandvideobridge)$

  opacity = 0.0 override
  no_anim = on
  no_initial_focus = on
  max_size = 1 1
  no_blur = on
}

windowrule {
  name = Volume Control As Floating Window
  match:class = ^(pavucontrol)$
  
  float = on
  pin = on
}

windowrule {
  name = Volume Control Size And Positioning
  match:class = ^(pavucontrol)$
  match:title = ^(Volume Control)$

  size = 800 500
  move = 1100 60
}

# Keep Steam notification from auto-focusing.
windowrule = match:class ^(steam)$, match:title ^(notificationtoasts_.*_desktop)$, no_focus on

# Tile the main Steam window.
windowrule = match:class ^(steam)$, match:title ^(Steam)$, tile on

# Make popup Steam windows float.
windowrule = match:class ^(steam)$, match:title ^(Steam Settings)$, float on

# Open Minecraft in fullscreen.
windowrule = match:class ^(Minecraft.*)$, fullscreen on

# Open btop maximized.
windowrule = match:class ^(btop)$, maximize on

workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
